<!DOCTYPE html>
<html>
<head>
  <title>Ticket Booking</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .seat {
      padding: 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .available { background: green; }
    .locked { background: orange; }
    .booked { background: red; }
  </style>
</head>
<body>

<h1>🎟 Seat Booking</h1>

<div id="seats" class="grid"></div>

<button onclick="bookSeat()">Book Selected Seat</button>

<script>
const API = "http://localhost:3000";
const userId = "user1"; // demo user
let selectedSeat = null;

// Load seats
async function loadSeats() {
  const res = await fetch(API + "/seats");
  const data = await res.json();

  const container = document.getElementById("seats");
  container.innerHTML = "";

  data.forEach(seat => {
    const div = document.createElement("div");
    div.innerText = seat.id;
    div.className = "seat " + seat.status;

    if (seat.status === "available") {
      div.onclick = () => selectSeat(seat.id);
    }

    container.appendChild(div);
  });
}

// Select seat
async function selectSeat(seatId) {
  const res = await fetch(API + "/lock-seat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ seatId, userId })
  });

  const data = await res.json();

  if (res.ok) {
    selectedSeat = seatId;
    alert("Seat locked: " + seatId);
  } else {
    alert(data.error);
  }

  loadSeats();
}

// Book seat
async function bookSeat() {
  if (!selectedSeat) {
    alert("Select a seat first!");
    return;
  }

  const res = await fetch(API + "/book", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ seatId: selectedSeat, userId })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Booking confirmed!");
    selectedSeat = null;
  } else {
    alert(data.error);
  }

  loadSeats();
}

// Auto refresh every 3 sec
setInterval(loadSeats, 3000);

loadSeats();
</script>

</body>
</html>
